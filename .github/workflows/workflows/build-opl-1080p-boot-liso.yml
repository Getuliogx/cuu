name: Build OPL 2241 1080p BOOT liso

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/ps2homebrew/ps2homebrew:main
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip patched OPL source
        run: |
          apt-get update >/dev/null 2>&1 || true
          apt-get install -y unzip >/dev/null 2>&1 || true
          mkdir -p src
          unzip -q OPL_2241_1080P_BOOT_LISO_SOURCE_FULL.zip -d src
          mv src/opl_boot1080_src/* src/
          rmdir src/opl_boot1080_src

      - name: Build ELF
        working-directory: src
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE/src" || true
          make --trace clean release

      - name: Collect ELF
        run: |
          mkdir -p artifact
          cp -f src/OPNPS2LD-*.ELF artifact/ 2>/dev/null || true
          cp -f src/opl.elf artifact/OPNPS2LD-2241-1080P-BOOT-LISO.ELF 2>/dev/null || true
          ls -la artifact

      - name: Upload final ELF
        uses: actions/upload-artifact@v4
        with:
          name: OPNPS2LD-2241-1080P-BOOT-LISO-ELF
          path: artifact/*.ELF

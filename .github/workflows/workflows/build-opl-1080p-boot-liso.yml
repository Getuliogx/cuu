name: Build OPL 2241 1080p BOOT liso

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/ps2homebrew/ps2homebrew:main
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip patched OPL source
        run: |
          apt-get update >/dev/null 2>&1 || true
          apt-get install -y unzip >/dev/null 2>&1 || true

          rm -rf src buildsrc artifact
          mkdir -p buildsrc src

          if [ ! -f "OPL_2241_1080P_BOOT_LISO_SOURCE_FULL.zip" ]; then
            echo "ERRO: O arquivo OPL_2241_1080P_BOOT_LISO_SOURCE_FULL.zip não está na raiz do repositório."
            ls -la
            exit 1
          fi

          unzip -q OPL_2241_1080P_BOOT_LISO_SOURCE_FULL.zip -d buildsrc

          ROOT_DIR="$(find buildsrc -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          if [ -z "$ROOT_DIR" ]; then
            echo "ERRO: não achei a pasta do source dentro do ZIP."
            find buildsrc -maxdepth 2 -type f | head -50
            exit 1
          fi

          # Copia tudo sem rsync, inclusive arquivos/pastas ocultos.
          (cd "$ROOT_DIR" && tar cf - .) | (cd src && tar xf -)

          echo "Source extraído em src:"
          ls -la src | head -40

      - name: Build ELF
        working-directory: src
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE/src" || true
          make clean || true
          make release

      - name: Collect ELF
        run: |
          mkdir -p artifact
          echo "ELFs encontrados:"
          find src \( -iname "*.ELF" -o -iname "*.elf" \) -print
          cp -f src/OPNPS2LD-*.ELF artifact/ 2>/dev/null || true
          cp -f src/OPNPS2LD*.ELF artifact/ 2>/dev/null || true
          cp -f src/opl.elf artifact/OPNPS2LD-2241-1080P-BOOT-LISO.ELF 2>/dev/null || true
          cp -f src/OPNPS2LD.ELF artifact/OPNPS2LD-2241-1080P-BOOT-LISO.ELF 2>/dev/null || true
          if ! ls artifact/*.ELF >/dev/null 2>&1; then
            echo "ERRO: compilou, mas não achei ELF final."
            find src -maxdepth 4 -type f | grep -Ei '\.(ELF|elf)$' || true
            exit 1
          fi
          ls -la artifact

      - name: Upload final ELF
        uses: actions/upload-artifact@v4
        with:
          name: OPNPS2LD-2241-1080P-BOOT-LISO-ELF
          path: artifact/*.ELF
